<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VERDICT X Banner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #050505;
      --paper: #f5f5f2;
      --signal: #e22b2b;
      --signal-bright: #ff5a5a;
      --muted: #bdbdb7;
      --steel: #6c6c6c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #111;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
      font-family: "DM Sans", sans-serif;
    }
    .banner {
      width: 1500px;
      height: 500px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 72% 46%, rgba(226, 43, 43, 0.22), transparent 24%),
        radial-gradient(circle at 70% 48%, rgba(255, 90, 90, 0.10), transparent 35%),
        linear-gradient(180deg, #050505 0%, #090909 100%);
      border-radius: 0;
    }
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 100% 84px, 214px 100%;
      opacity: 0.22;
      mask-image: linear-gradient(90deg, transparent 0%, rgba(0,0,0,0.9) 12%, rgba(0,0,0,0.9) 88%, transparent 100%);
    }
    .content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 56px 76px;
    }
    .left {
      max-width: 760px;
    }
    .eyebrow {
      font-family: "IBM Plex Mono", monospace;
      font-size: 17px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
    }
    h1 {
      margin: 0 0 16px;
      font-family: "Syne", sans-serif;
      font-size: 128px;
      line-height: 0.92;
      letter-spacing: -0.06em;
      color: var(--paper);
      text-transform: uppercase;
    }
    .subhead {
      margin: 0 0 24px;
      font-size: 28px;
      line-height: 1.3;
      color: #d9d9d4;
      max-width: 720px;
    }
    .signal-line {
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--signal-bright);
      font-family: "IBM Plex Mono", monospace;
      font-size: 19px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .signal-line::before {
      content: "";
      width: 62px;
      height: 2px;
      background: linear-gradient(90deg, var(--signal), var(--signal-bright));
      display: block;
    }
    .right {
      width: 420px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    .logo-shell {
      width: 330px;
      height: 330px;
      border-radius: 40px;
      background: radial-gradient(circle at 50% 35%, rgba(255,255,255,0.08), rgba(255,255,255,0.02) 55%, rgba(255,255,255,0.01) 100%);
      border: 1px solid rgba(255,255,255,0.09);
      backdrop-filter: blur(14px);
      display: grid;
      place-items: center;
      box-shadow: 0 30px 90px rgba(0,0,0,0.45);
    }
    .logo-shell img {
      width: 260px;
      display: block;
      filter: drop-shadow(0 22px 38px rgba(226,43,43,0.18));
    }
  </style>
</head>
<body>
  <section class="banner">
    <div class="grid"></div>
    <div class="content">
      <div class="left">
        <div class="eyebrow">The Machine Court</div>
        <h1>VERDICT</h1>
        <p class="subhead">Deterministic onchain enforcement for agent economies.</p>
        <div class="signal-line">No Human Judge  No Oracle  No LLM In Path</div>
      </div>
      <div class="right">
        <div class="logo-shell">
          <img src="./verdict-logo-primary.png" alt="VERDICT logo" />
        </div>
      </div>
    </div>
  </section>
</body>
</html>
